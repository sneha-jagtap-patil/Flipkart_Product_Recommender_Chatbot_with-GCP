<!DOCTYPE html>
<html lang="en">

<head>
    <title>Flipkart | Product Recommender</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">

    <!-- jQuery & Marked -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}" />
</head>

<body>
    <div class="container-fluid">
        <div class="chat">
            <div class="card">
                <!-- Header -->
                <div class="card-header msg_head">
                    <div class="d-flex align-items-center">
                        <div class="mr-3">
                            <img src="https://assets.stickpng.com/images/580b57fcd9996e24bc43c530.png"
                                class="rounded-circle user_img" alt="Flipkart Logo">
                        </div>
                        <div class="user_info">
                            <span>Flipkart Assistant</span>
                            <p>Online | Helping you find the best products</p>
                        </div>
                    </div>
                </div>

                <!-- Chat Body -->
                <div id="messageFormeight" class="card-body msg_card_body">
                    <!-- Initial Bot Message -->
                    <div class="msg_cotainer">
                        Hello! I'm your Flipkart Product Assistant. How can I help you today?
                        <span class="msg_time">Just now</span>
                    </div>
                </div>

                <!-- Footer -->
                <div class="card-footer">
                    <form id="messageArea">
                        <input type="text" id="text" name="msg" placeholder="Tell me what you're looking for..."
                            autocomplete="off" class="form-control type_msg" required />
                        <button type="submit" id="send" class="send_btn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            const $msgBody = $("#messageFormeight");
            const $inputText = $("#text");

            function scrollToBottom() {
                $msgBody.animate({ scrollTop: $msgBody[0].scrollHeight }, 500);
            }

            $("#messageArea").on("submit", function (event) {
                event.preventDefault();

                const rawText = $inputText.val().trim();
                if (!rawText) return;

                const date = new Date();
                const str_time = date.getHours().toString().padStart(2, '0') + ":" +
                    date.getMinutes().toString().padStart(2, '0');

                // User Message
                const userHtml = `
                    <div class="msg_cotainer_send">
                        ${rawText}
                        <span class="msg_time_send">${str_time}</span>
                    </div>`;

                $msgBody.append(userHtml);
                $inputText.val("");
                scrollToBottom();

                // Get Bot Response
                $.ajax({
                    data: { msg: rawText },
                    type: "POST",
                    url: "/get",
                    success: function (data) {
                        const formattedData = marked.parse(data);
                        const botHtml = `
                            <div class="msg_cotainer">
                                ${formattedData}
                                <span class="msg_time">${str_time}</span>
                            </div>`;
                        $msgBody.append(botHtml);
                        scrollToBottom();
                    },
                    error: function () {
                        const errorHtml = `
                            <div class="msg_cotainer">
                                Sorry, I encountered an error. Please try again.
                                <span class="msg_time">${str_time}</span>
                            </div>`;
                        $msgBody.append(errorHtml);
                        scrollToBottom();
                    }
                });
            });
        });
    </script>

</body>

</html>
